apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: github
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/trutzio/kubernetes-tutorial-flux.git
  ref:
    branch: main
  ignore: |
    # exclude all
    /*
    # include charts directory
    !/charts/   