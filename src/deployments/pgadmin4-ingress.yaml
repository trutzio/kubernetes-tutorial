apiVersion: networking.k8s.io/v1
kind: Ingress	
metadata:	
  name: pgadmin4
spec:
  ingressClassName: traefik	
  rules:
    - host: pgadmin4.trutz.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pgadmin4
                port:
                  number: 9090